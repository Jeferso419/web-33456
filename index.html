<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Corazón Galáctico ❤️🌷</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    /* ── CANVAS DEL CORAZÓN (proyecto 1 — INTACTO) ── */
    /* El CSS original del canvas se mantiene aquí exactamente */
    #heart {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,.2);
      z-index: 1;
    }

    /* ── CANVAS DE THREE.JS (galaxia — overlay) ── */
    #galaxy-canvas {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;   /* no bloquea interacción del corazón */
      opacity: 1;
      transition: opacity 0.6s ease;
    }
    #galaxy-canvas.hidden { opacity: 0; }

    /* ── AUDIO (oculto) ── */
    #music { display: none; }

    /* ── CONTROLES FLOTANTES ── */
    #controls {
      position: absolute;
      bottom: 28px;
      right: 28px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      color: #f0d8ff;
      background: rgba(30, 5, 50, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(180, 80, 255, 0.35);
      box-shadow: 0 0 14px rgba(160, 50, 255, 0.15);
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .ctrl-btn:hover {
      background: rgba(80, 10, 120, 0.65);
      box-shadow: 0 0 22px rgba(200, 80, 255, 0.35);
      transform: scale(1.04);
    }
    .ctrl-btn .icon { font-size: 1rem; }

    /* ── LETRAS (LYRICS) ── */
    #lyrics-container {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9;
      width: min(680px, 90vw);
      text-align: center;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #lyrics-container.hidden { opacity: 0; }

    .lyric-line {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.05rem, 2.8vw, 1.65rem);
      font-style: italic;
      font-weight: 300;
      color: rgba(220, 170, 255, 0.38);
      line-height: 1.7;
      transition: color 0.45s ease, text-shadow 0.45s ease, transform 0.45s ease, font-size 0.35s ease;
      transform: scale(0.97);
      letter-spacing: 0.03em;
    }
    .lyric-line.active {
      color: rgba(255, 230, 255, 0.96);
      text-shadow:
        0 0 18px rgba(220, 100, 255, 0.9),
        0 0 36px rgba(180, 60, 255, 0.5),
        0 0 60px rgba(140, 40, 200, 0.3);
      transform: scale(1.04);
      font-size: clamp(1.15rem, 3.1vw, 1.82rem);
    }
    .lyric-line.prev {
      color: rgba(200, 140, 255, 0.55);
      text-shadow: 0 0 8px rgba(200, 80, 255, 0.3);
    }

    /* ── TÍTULO SUPERIOR ── */
    #title-badge {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      text-align: center;
      animation: fadeDown 1.2s ease-out both;
    }
    #title-badge h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.3rem, 3.5vw, 2.1rem);
      letter-spacing: 0.18em;
      color: transparent;
      background: linear-gradient(135deg, #ff99cc, #cc66ff, #ff66aa);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 14px rgba(255, 80, 160, 0.5));
    }
    #title-badge p {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      color: rgba(220, 160, 255, 0.55);
      margin-top: 4px;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── BARRA DE PROGRESO DE MÚSICA ── */
    #music-progress {
      position: absolute;
      bottom: 0; left: 0;
      width: 0%;
      height: 2px;
      background: linear-gradient(90deg, #ff66aa, #cc44ff);
      z-index: 11;
      transition: width 0.5s linear;
      box-shadow: 0 0 8px rgba(220, 80, 255, 0.7);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      #controls { bottom: 16px; right: 14px; gap: 7px; }
      .ctrl-btn  { padding: 7px 12px; font-size: 0.66rem; }
      #lyrics-container { bottom: 84px; }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════
       PROYECTO 1: CORAZÓN (canvas original intacto)
  ══════════════════════════════════════════ -->
  <canvas id="heart" width="1920" height="947"></canvas>

  <!-- ══════════════════════════════════════════
       PROYECTO 2: GALAXIA THREE.JS (overlay)
       El canvas lo crea Three.js en JS — se le asigna id="galaxy-canvas"
  ══════════════════════════════════════════ -->

  <!-- ── TÍTULO ── -->
  <div id="title-badge">
    <h1>❤️ &nbsp;Corazón Galáctico&nbsp; 🌷</h1>
    <p>UN UNIVERSO DE AMOR</p>
  </div>

  <!-- ── LETRAS ── -->
  <div id="lyrics-container">
    <div id="lyric-prev"  class="lyric-line prev"></div>
    <div id="lyric-curr"  class="lyric-line active"></div>
    <div id="lyric-next"  class="lyric-line"></div>
  </div>

  <!-- ── CONTROLES ── -->
  <div id="controls">
    <button class="ctrl-btn" id="btn-music" onclick="toggleMusic()">
      <span class="icon">▶</span><span id="music-label">Reproducir música</span>
    </button>
    <button class="ctrl-btn" id="btn-galaxy" onclick="toggleGalaxy()">
      <span class="icon">🌌</span><span>Ocultar galaxia</span>
    </button>
    <button class="ctrl-btn" id="btn-lyrics" onclick="toggleLyrics()">
      <span class="icon">🎵</span><span>Ocultar letras</span>
    </button>
  </div>

  <!-- ── BARRA DE PROGRESO ── -->
  <div id="music-progress"></div>

  <!-- ══════════════════════════════════════════
       AUDIO — cambia solo el src para cambiar canción
  ══════════════════════════════════════════ -->
  <audio id="music" loop>
    <source src="musica/Download (2).mp4" type="audio/mpeg">
  </audio>

  <!-- ══════════════════════════════════════════
       SCRIPT 1: ANIMACIÓN DEL CORAZÓN (código original de Animacion.js — INTACTO)
  ══════════════════════════════════════════ -->
  <script>
  /* =========================================================
     ANIMACION.JS — CÓDIGO ORIGINAL INTACTO, SIN MODIFICACIÓN
     ========================================================= */
  window.requestAnimationFrame =
  window.__requestAnimationFrame ||
  window.requestAnimationFrame ||
  window.webkitRequestAnimationFrame ||
  window.mozRequestAnimationFrame ||
  window.oRequestAnimationFrame ||
  window.msRequestAnimationFrame ||
  (function () {
    return function (callback, elemento) {
      let ultimoTiempo = elemento.__ultimoTiempo;
      if (ultimoTiempo === undefined) {
        ultimoTiempo = 0;
      }
      let tiempoActual = Date.now();
      let tiempoParaLlamar = Math.max(1, 33 - (tiempoActual - ultimoTiempo));
      window.setTimeout(callback, tiempoParaLlamar);
      elemento.__ultimoTiempo = tiempoActual + tiempoParaLlamar;
    };
  })();

  window.esDispositivo = (/android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(((navigator.userAgent || navigator.vendor || window.opera)).toLowerCase()));

  let cargado = false;
  let iniciar = function () {
    if (cargado) return;
    cargado = true;
    let movil = window.esDispositivo;
    let koef = movil ? 0.5 : 1;
    let lienzo = document.getElementById('heart');
    let ctx = lienzo.getContext('2d');
    let ancho = lienzo.width = koef * innerWidth;
    let alto = lienzo.height = koef * innerHeight;
    let aleatorio = Math.random;

    ctx.fillStyle = "rgba(0,0,0,1)";
    ctx.fillRect(0, 0, ancho, alto);

    let posicionCorazon = function (rad) {
      return [Math.pow(Math.sin(rad), 3), -(15 * Math.cos(rad) - 5 * Math.cos(2 * rad) - 2 * Math.cos(3 * rad) - Math.cos(4 * rad))];
    };

    let escalarYTraducir = function (pos, sx, sy, dx, dy) {
      return [dx + pos[0] * sx, dy + pos[1] * sy];
    };

    window.addEventListener('resize', function () {
      ancho = lienzo.width = koef * innerWidth;
      alto = lienzo.height = koef * innerHeight;
      ctx.fillStyle = "rgba(0,0,0,1)";
      ctx.fillRect(0, 0, ancho, alto);
    });

    let cantidadRastro = movil ? 20 : 50;
    let puntosOrigen = [];
    let i;
    let dr = movil ? 0.3 : 0.1;
    for (i = 0; i < Math.PI * 2; i += dr) puntosOrigen.push(escalarYTraducir(posicionCorazon(i), 210, 13, 0, 0));
    for (i = 0; i < Math.PI * 2; i += dr) puntosOrigen.push(escalarYTraducir(posicionCorazon(i), 150, 9, 0, 0));
    for (i = 0; i < Math.PI * 2; i += dr) puntosOrigen.push(escalarYTraducir(posicionCorazon(i), 90, 5, 0, 0));
    let cantidadPuntosCorazon = puntosOrigen.length;

    let puntosObjetivo = [];
    let pulso = function (kx, ky) {
      for (i = 0; i < puntosOrigen.length; i++) {
        puntosObjetivo[i] = [];
        puntosObjetivo[i][0] = kx * puntosOrigen[i][0] + ancho / 2;
        puntosObjetivo[i][1] = ky * puntosOrigen[i][1] + alto / 2;
      }
    };

    let e = [];
    for (i = 0; i < cantidadPuntosCorazon; i++) {
      let x = aleatorio() * ancho;
      let y = aleatorio() * alto;
      e[i] = {
        vx: 0,
        vy: 0,
        R: 2,
        velocidad: aleatorio() + 5,
        q: ~~(aleatorio() * cantidadPuntosCorazon),
        D: 2 * (i % 2) - 1,
        fuerza: 0.2 * aleatorio() + 0.7,
        f: "hsla(0," + ~~(40 * aleatorio() + 60) + "%," + ~~(60 * aleatorio() + 20) + "%,.3)",
        rastro: []
      };
      for (let k = 0; k < cantidadRastro; k++) e[i].rastro[k] = { x: x, y: y };
    }

    let configuracion = {
      trazoK: 0.4,
      deltaTiempo: 0.01
    };

    let tiempo = 0;
    let bucle = function () {
      let n = -Math.cos(tiempo);
      pulso((1 + n) * .5, (1 + n) * .5);
      tiempo += ((Math.sin(tiempo)) < 0 ? 9 : (n > 0.8) ? .2 : 1) * configuracion.deltaTiempo;
      ctx.fillStyle = "rgba(0,0,0,.1)";
      ctx.fillRect(0, 0, ancho, alto);
      for (i = e.length; i--;) {
        var u = e[i];
        var q = puntosObjetivo[u.q];
        var dx = u.rastro[0].x - q[0];
        var dy = u.rastro[0].y - q[1];
        var longitud = Math.sqrt(dx * dx + dy * dy);
        if (10 > longitud) {
          if (0.95 < aleatorio()) {
            u.q = ~~(aleatorio() * cantidadPuntosCorazon);
          } else {
            if (0.99 < aleatorio()) {
              u.D *= -1;
            }
            u.q += u.D;
            u.q %= cantidadPuntosCorazon;
            if (0 > u.q) {
              u.q += cantidadPuntosCorazon;
            }
          }
        }
        u.vx += -dx / longitud * u.velocidad;
        u.vy += -dy / longitud * u.velocidad;
        u.rastro[0].x += u.vx;
        u.rastro[0].y += u.vy;
        u.vx *= u.fuerza;
        u.vy *= u.fuerza;
        for (k = 0; k < u.rastro.length - 1;) {
          let T = u.rastro[k];
          let N = u.rastro[++k];
          N.x -= configuracion.trazoK * (N.x - T.x);
          N.y -= configuracion.trazoK * (N.y - T.y);
        }
        ctx.fillStyle = u.f;
        for (k = 0; k < u.rastro.length; k++) {
          ctx.fillRect(u.rastro[k].x, u.rastro[k].y, 1, 1);
        }
      }
      ctx.fillStyle = "rgba(255,255,255,1)";
      for (i = u.rastro.length + 13; i--;) ctx.fillRect(puntosObjetivo[i][0], puntosObjetivo[i][1], 2, 2);

      window.requestAnimationFrame(bucle, lienzo);
    };
    bucle();
  };

  let estado = document.readyState;
  if (estado === 'complete' || estado === 'loaded' || estado === 'interactive') iniciar();
  else document.addEventListener('DOMContentLoaded', iniciar, false);
  /* =========================================================
     FIN ANIMACION.JS ORIGINAL
     ========================================================= */
  </script>

  <!-- ══════════════════════════════════════════
       SCRIPT 2: GALAXIA THREE.JS — ENCAPSULADO EN MODULE
       (sin variables globales, sin interferencias)
  ══════════════════════════════════════════ -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  /* ── Todas las variables son locales al módulo — sin contaminación global ── */
  import * as THREE from 'three';
  import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
  import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

  // --- Escena ---
  const scene = new THREE.Scene();
  scene.background = null;   // transparente para ver el corazón debajo
  scene.fog = new THREE.FogExp2(0x06010f, 0.00042);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
  camera.position.set(13, 6, 18);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));  // optimización FPS
  renderer.toneMapping = THREE.ReinhardToneMapping;
  renderer.toneMappingExposure = 1.3;
  renderer.setClearColor(0x000000, 0);   // fondo transparente

  // Asignar id al canvas de Three.js para poder controlarlo con CSS
  renderer.domElement.id = 'galaxy-canvas';
  document.body.appendChild(renderer.domElement);

  // --- Bloom ---
  const renderScene = new RenderPass(scene, camera);
  const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    1.1, 0.40, 0.82
  );
  bloomPass.threshold = 0.07;
  bloomPass.strength  = 0.75;
  bloomPass.radius    = 0.6;
  const effectComposer = new EffectComposer(renderer);
  effectComposer.addPass(renderScene);
  effectComposer.addPass(bloomPass);

  // --- Controles orbitales (pointer-events:none en canvas → OrbitControls no bloquea el corazón) ---
  // Los controles de órbita quedan desactivados para no interferir
  // Si quieres orbitar la galaxia, cambia pointer-events a 'auto' en #galaxy-canvas
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping   = true;
  controls.dampingFactor   = 0.06;
  controls.rotateSpeed     = 1.2;
  controls.zoomSpeed       = 1.0;
  controls.enableZoom      = true;
  controls.autoRotate      = true;
  controls.autoRotateSpeed = 0.55;
  controls.target.set(0, 0.5, 0);

  // ── TEXTURAS TULIPÁN ──
  function createTulipTexture(variant) {
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 128, 128);
    const cx = 64, cy = 68;
    const purples  = ['#9b30d0','#b44fe8','#7b2ab5','#c070f0','#6a1fa0'];
    const purples2 = ['#d080ff','#e0a0ff','#a040cc','#bf66ee','#8833bb'];
    const pCol  = purples [variant % purples.length];
    const pCol2 = purples2[variant % 5];
    if (variant === 0) {
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2;
        const px = cx + Math.cos(angle) * 26;
        const py = cy + Math.sin(angle) * 26;
        const grad = ctx.createRadialGradient(px, py, 2, px, py, 28);
        grad.addColorStop(0, pCol2);
        grad.addColorStop(1, pCol);
        ctx.beginPath();
        ctx.ellipse(px, py, 18, 28, angle + Math.PI/2, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();
      }
    } else if (variant === 1) {
      for (let i = 0; i < 3; i++) {
        const angle = (i / 3) * Math.PI * 2;
        ctx.beginPath();
        ctx.ellipse(cx + Math.cos(angle)*20, cy + Math.sin(angle)*20, 14, 30, angle + Math.PI/2, 0, Math.PI*2);
        ctx.fillStyle = pCol2; ctx.fill();
      }
      for (let i = 0; i < 3; i++) {
        const angle = (i / 3) * Math.PI * 2 + Math.PI/3;
        ctx.beginPath();
        ctx.ellipse(cx + Math.cos(angle)*26, cy + Math.sin(angle)*26, 12, 26, angle + Math.PI/2, 0, Math.PI*2);
        ctx.fillStyle = pCol; ctx.fill();
      }
    } else {
      for (let i = 0; i < 10; i++) {
        const angle = (i / 10) * Math.PI * 2;
        ctx.beginPath();
        ctx.ellipse(cx + Math.cos(angle)*28, cy + Math.sin(angle)*28, 11, 20, angle + Math.PI/2, 0, Math.PI*2);
        ctx.fillStyle = i%2===0 ? pCol : pCol2; ctx.fill();
      }
    }
    const cGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, 13);
    cGrad.addColorStop(0, '#ffe0ff');
    cGrad.addColorStop(0.5, '#cc55ee');
    cGrad.addColorStop(1, '#6600aa');
    ctx.beginPath(); ctx.arc(cx, cy, 13, 0, Math.PI*2);
    ctx.fillStyle = cGrad; ctx.fill();
    ctx.fillStyle = '#ffe8ff';
    for (let i = 0; i < 12; i++) {
      const r = Math.random()*10, a = Math.random()*Math.PI*2;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(a)*r, cy + Math.sin(a)*r, 1.2, 0, Math.PI*2);
      ctx.fill();
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.needsUpdate = true;
    return tex;
  }

  const tulipTextures = [createTulipTexture(0), createTulipTexture(1), createTulipTexture(2)];

  // ── PARTÍCULAS GALAXIA ──
  const TOTAL_FLOWERS    = 14000;   // reducido para mejor FPS
  const positions        = new Float32Array(TOTAL_FLOWERS * 3);
  const colors           = new Float32Array(TOTAL_FLOWERS * 3);
  const sizes            = new Float32Array(TOTAL_FLOWERS);
  const texIndices       = new Float32Array(TOTAL_FLOWERS);
  const arms             = 4;
  const spiralTightness  = 2.6;
  const armSpread        = 0.58;
  const innerRadius      = 1.0;
  const outerRadius      = 16.2;

  for (let i = 0; i < TOTAL_FLOWERS; i++) {
    let radius, angle, yOffset;
    const isCore = Math.random() < 0.2;
    if (isCore) {
      radius  = Math.pow(Math.random(), 1.3) * 3.8;
      angle   = Math.random() * Math.PI * 2;
      yOffset = (Math.random() - 0.5) * 1.9 * (1 - radius / 5);
    } else {
      const armIdx      = Math.floor(Math.random() * arms);
      const armAngleOff = (armIdx / arms) * Math.PI * 2;
      const t           = Math.pow(Math.random(), 1.1);
      radius            = innerRadius + t * (outerRadius - innerRadius);
      const spiralAngle = spiralTightness * Math.log(radius + 0.6) + armAngleOff;
      const randOff     = (Math.random() - 0.5) * armSpread * (1 + radius * 0.08);
      angle   = spiralAngle + randOff;
      yOffset = Math.sin(radius * 1.4 + armIdx) * 0.85 + (Math.random()-0.5) * 0.8;
      if (Math.random() > 0.7) yOffset += (Math.random()-0.5) * 0.9;
    }
    positions[i*3]   = Math.cos(angle) * radius;
    positions[i*3+1] = yOffset * 1.3;
    positions[i*3+2] = Math.sin(angle) * radius;
    const dist = Math.min(1, Math.sqrt(positions[i*3]**2 + positions[i*3+1]**2 + positions[i*3+2]**2) / 14);
    let r = 0.45 + Math.random()*0.35;
    let g = 0.0  + Math.random()*0.15;
    let b = 0.65 + Math.random()*0.35;
    if (dist < 0.3) { r = 0.6; g = 0.05; b = 0.9; }
    if (dist > 0.7) { r = 0.7; g = 0.2;  b = 1.0; }
    colors[i*3] = r; colors[i*3+1] = g; colors[i*3+2] = b;
    let sizeVal = 0.28 + Math.random()*0.48;
    if (dist < 0.3) sizeVal *= 0.85;
    if (dist > 0.8) sizeVal *= 1.25;
    if (Math.random() > 0.93) sizeVal *= 1.55;
    sizes[i]      = sizeVal;
    texIndices[i] = Math.floor(Math.random() * tulipTextures.length);
  }

  const flowerGeometry = new THREE.BufferGeometry();
  flowerGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  flowerGeometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  flowerGeometry.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));
  flowerGeometry.setAttribute('texIndex', new THREE.BufferAttribute(texIndices, 1));

  const vertexShader = `
    attribute float size;
    attribute vec3 color;
    attribute float texIndex;
    varying vec3 vColor;
    varying float vTexIndex;
    void main() {
      vColor = color; vTexIndex = texIndex;
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (280.0 / (-mvPos.z)) * 0.95;
      gl_PointSize = clamp(gl_PointSize, 6.0, 44.0);
      gl_Position = projectionMatrix * mvPos;
    }`;

  const fragmentShader = `
    uniform sampler2D uTextures[3];
    varying vec3 vColor;
    varying float vTexIndex;
    void main() {
      int idx = int(round(vTexIndex));
      vec4 texColor;
      if (idx == 0)      texColor = texture2D(uTextures[0], gl_PointCoord);
      else if (idx == 1) texColor = texture2D(uTextures[1], gl_PointCoord);
      else               texColor = texture2D(uTextures[2], gl_PointCoord);
      if (texColor.a < 0.2) discard;
      vec3 finalColor = vColor * texColor.rgb + vec3(0.07, 0.01, 0.15);
      gl_FragColor = vec4(finalColor, texColor.a * 0.88);
    }`;

  const flowerMaterial = new THREE.ShaderMaterial({
    uniforms: { uTextures: { value: tulipTextures } },
    vertexShader, fragmentShader,
    transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  scene.add(new THREE.Points(flowerGeometry, flowerMaterial));

  // ── TULIPANES 3D ──
  function createTulip3D(x, z, yOff = 0, scale = 1.0) {
    const group = new THREE.Group();
    const stemMat = new THREE.MeshStandardMaterial({ color: 0x3a8a3a, roughness: 0.6 });
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.10*scale, 0.16*scale, 1.2*scale, 6), stemMat);
    stem.position.y = -0.6 * scale;
    group.add(stem);
    const leafMat = new THREE.MeshStandardMaterial({ color: 0x4db04d, side: THREE.DoubleSide });
    [-1, 1].forEach(side => {
      const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.18*scale, 0.6*scale, 5), leafMat);
      leaf.position.set(side*0.28*scale, -0.25*scale, 0);
      leaf.rotation.z = side*0.55; leaf.rotation.x = 0.15;
      group.add(leaf);
    });
    const petalColors = [0x8822cc, 0x9933dd, 0x7711bb, 0xaa44ee, 0x6600aa, 0xbb55ff];
    const petalMat = new THREE.MeshStandardMaterial({
      color: petalColors[Math.floor(Math.random()*petalColors.length)],
      emissive: 0x440088, emissiveIntensity: 0.3,
      roughness: 0.4, side: THREE.DoubleSide
    });
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2;
      const petal = new THREE.Mesh(new THREE.CylinderGeometry(0.05*scale, 0.22*scale, 0.7*scale, 5), petalMat);
      petal.position.set(Math.cos(angle)*0.28*scale, 0.22*scale, Math.sin(angle)*0.28*scale);
      petal.rotation.z = angle + Math.PI/2;
      petal.rotation.x = Math.cos(angle)*0.35;
      group.add(petal);
    }
    const pistilMat = new THREE.MeshStandardMaterial({ color: 0xffccff, emissive: 0xcc66ff, emissiveIntensity: 0.5 });
    const pistil = new THREE.Mesh(new THREE.SphereGeometry(0.10*scale, 8, 8), pistilMat);
    pistil.position.y = 0.55 * scale;
    group.add(pistil);
    group.position.set(x, yOff, z);
    group.rotation.y = Math.random() * Math.PI * 2;
    return group;
  }

  const tulipPositions = [];
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const r = 1.8 + Math.random() * 1.2;
    tulipPositions.push({ x: Math.cos(angle)*r, z: Math.sin(angle)*r, y: -0.2+Math.random()*0.5, scale: 0.9+Math.random()*0.3 });
  }
  const armAngles = [0, Math.PI/2, Math.PI, 3*Math.PI/2];
  for (let a = 0; a < armAngles.length; a++) {
    for (let r = 3.5; r <= 12; r += 2.2) {
      const base  = spiralTightness * Math.log(r + 0.8);
      const angle = base + armAngles[a] + (Math.random()-0.5)*0.8;
      const x = Math.cos(angle)*r, z = Math.sin(angle)*r;
      const y = Math.sin(r*1.2)*0.4 + (Math.random()-0.5)*0.4;
      tulipPositions.push({ x, z, y: y-0.1, scale: 0.8+Math.random()*0.5 });
    }
  }
  for (let i = 0; i < 12; i++) {
    const rad = 6 + Math.random()*7, ang = Math.random()*Math.PI*2;
    tulipPositions.push({ x: Math.cos(ang)*rad, z: Math.sin(ang)*rad, y: (Math.random()-0.5)*1.2, scale: 0.7+Math.random()*0.6 });
  }

  const tulipsGroup = new THREE.Group();
  tulipPositions.forEach(p => tulipsGroup.add(createTulip3D(p.x, p.z, p.y, p.scale)));
  scene.add(tulipsGroup);

  // Polen
  const pollenCount = 1200;
  const pollenPos   = new Float32Array(pollenCount * 3);
  for (let i = 0; i < pollenCount; i++) {
    const base = tulipPositions[Math.floor(Math.random()*tulipPositions.length)];
    pollenPos[i*3]   = base.x + (Math.random()-0.5)*1.2;
    pollenPos[i*3+1] = base.y + (Math.random()-0.5)*1.0 + 0.2;
    pollenPos[i*3+2] = base.z + (Math.random()-0.5)*1.2;
  }
  const pollenGeo = new THREE.BufferGeometry();
  pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPos, 3));
  scene.add(new THREE.Points(pollenGeo, new THREE.PointsMaterial({
    color: 0xcc88ff, size: 0.05, transparent: true, blending: THREE.AdditiveBlending
  })));

  // Estrellas
  const starCount = 3500;
  const starPos = new Float32Array(starCount*3), starCol = new Float32Array(starCount*3);
  for (let i = 0; i < starCount; i++) {
    const rad = 40 + Math.random()*55, theta = Math.random()*Math.PI*2, phi = Math.acos(2*Math.random()-1);
    starPos[i*3]   = rad*Math.sin(phi)*Math.cos(theta);
    starPos[i*3+1] = rad*Math.sin(phi)*Math.sin(theta)*0.5;
    starPos[i*3+2] = rad*Math.cos(phi);
    const k = 0.4 + Math.random()*0.8;
    starCol[i*3] = k*(Math.random()>0.5?0.7:0.4); starCol[i*3+1] = k*0.2; starCol[i*3+2] = k*(0.8+Math.random()*0.2);
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  starGeo.setAttribute('color',    new THREE.BufferAttribute(starCol, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
    size: 0.15, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending
  })));

  // Polvo
  const dustCount = 5000;
  const dustPos   = new Float32Array(dustCount*3);
  for (let i = 0; i < dustCount; i++) {
    const r = 5+Math.random()*14, ang = Math.random()*Math.PI*2, y = (Math.random()-0.5)*4.5;
    dustPos[i*3]   = Math.cos(ang)*r*(0.6+Math.random()*0.7);
    dustPos[i*3+1] = y+(Math.random()-0.5)*1.5;
    dustPos[i*3+2] = Math.sin(ang)*r*(0.6+Math.random()*0.7);
  }
  const dustGeo = new THREE.BufferGeometry();
  dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
  const dustCloud = new THREE.Points(dustGeo, new THREE.PointsMaterial({
    color: 0xaa44ff, size: 0.05, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending
  }));
  scene.add(dustCloud);

  // Núcleo y halo
  const coreGlow = new THREE.Mesh(
    new THREE.SphereGeometry(1.4, 32, 32),
    new THREE.MeshStandardMaterial({ color: 0xaa00ff, emissive: 0x7700cc, emissiveIntensity: 1.8, roughness: 0.2 })
  );
  scene.add(coreGlow);
  const haloCount = 1200;
  const haloPos = new Float32Array(haloCount*3);
  for (let i = 0; i < haloCount; i++) {
    const r = 1.8+Math.random()*2.2, theta = Math.random()*Math.PI*2, phi = Math.acos(2*Math.random()-1);
    haloPos[i*3] = r*Math.sin(phi)*Math.cos(theta); haloPos[i*3+1] = r*Math.sin(phi)*Math.sin(theta)*0.7; haloPos[i*3+2] = r*Math.cos(phi);
  }
  const haloGeo = new THREE.BufferGeometry();
  haloGeo.setAttribute('position', new THREE.BufferAttribute(haloPos, 3));
  const haloRing = new THREE.Points(haloGeo, new THREE.PointsMaterial({
    color: 0xcc66ff, size: 0.09, blending: THREE.AdditiveBlending
  }));
  scene.add(haloRing);

  // Luces
  scene.add(new THREE.AmbientLight(0x110022));
  const pLight = new THREE.PointLight(0xaa44ff, 1.3, 30);
  pLight.position.set(2, 1.5, 2); scene.add(pLight);
  scene.add(Object.assign(new THREE.PointLight(0x8800cc, 0.8), { position: new THREE.Vector3(-3, 2, -5) }));
  scene.add(Object.assign(new THREE.PointLight(0xcc88ff, 0.6), { position: new THREE.Vector3(1, 3, 3) }));

  // ── ANIMACIÓN ──
  let time = 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.007;
    coreGlow.material.emissiveIntensity = 1.4 + Math.sin(time*2.5)*0.5;
    pLight.intensity = 1.0 + Math.sin(time*2.2)*0.3;
    dustCloud.rotation.y = time * 0.03;
    haloRing.rotation.y  = time * 0.09;
    haloRing.rotation.x  = Math.sin(time*0.2)*0.1;
    tulipsGroup.children.forEach((tulip, idx) => {
      tulip.rotation.z = Math.sin(time*1.1 + idx)*0.035;
      tulip.rotation.x = Math.cos(time*0.9 + idx)*0.02;
    });
    controls.update();
    effectComposer.render();
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    effectComposer.setSize(window.innerWidth, window.innerHeight);
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  </script>

  <!-- ══════════════════════════════════════════
       SCRIPT 3: MÚSICA + LETRAS (vanilla JS global)
  ══════════════════════════════════════════ -->
  <script>
  /* ════════════════════════════════════════════
     LETRAS — Edita aquí tu canción fácilmente
     Cada objeto: { time: segundos, text: "letra" }
     Ajusta los tiempos a tu canción real.
     ════════════════════════════════════════════ */
  const lyrics = [
  { time: 0,  text: "Para ahogar esta pena" },
  { time: 3,  text: "buscaré una sirena" },
  { time: 6,  text: "imaginando de esos besos tuyos" },
  { time: 8, text: "porque no tengo esos besos tuyos" },

  { time: 11, text: "Para ahogar esta pena" },
  { time: 13, text: "buscaré otra sirena" },
  { time: 17, text: "imaginando esos besos tuyos" },
  { time: 19, text: "porque no tengo esos besos tuyos" },

  { time: 21, text: "te encontraré" },

  { time: 23, text: "aunque sé bien que si no hay otra" },
  { time: 26, text: "voy a buscarte en otra boca" },
  { time: 28, text: "y al final te encontraré" },

  { time: 31, text: "te encontrare"},

  { time: 33, text: "será tu culpa si me muero" },
  { time: 36, text: "porque tocarte ya no puedo" },
  { time: 38, text: "y otra vez me mentiré, pero te encontraré" }
];

  /* ── Estado de música ── */
  const music       = document.getElementById('music');
  const btnMusic    = document.getElementById('btn-music');
  const musicLabel  = document.getElementById('music-label');
  const progressBar = document.getElementById('music-progress');
  const lyricPrev   = document.getElementById('lyric-prev');
  const lyricCurr   = document.getElementById('lyric-curr');
  const lyricNext   = document.getElementById('lyric-next');

  let musicPlaying  = false;
  let galaxyVisible = true;
  let lyricsVisible = true;
  let currentLyricIdx = -1;

  /* ── Intentar autoplay al cargar ── */
  window.addEventListener('load', () => {
    music.volume = 0.65;
    const tryPlay = music.play();
    if (tryPlay !== undefined) {
      tryPlay.then(() => {
        musicPlaying = true;
        btnMusic.querySelector('.icon').textContent = '⏸';
        musicLabel.textContent = 'Pausar música';
      }).catch(() => {
        // Autoplay bloqueado por el navegador — el usuario debe pulsar play
        musicPlaying = false;
      });
    }
  });

  /* ── Toggle música ── */
  window.toggleMusic = function () {
    if (musicPlaying) {
      music.pause();
      musicPlaying = false;
      btnMusic.querySelector('.icon').textContent = '▶';
      musicLabel.textContent = 'Reproducir música';
    } else {
      music.play().catch(() => {});
      musicPlaying = true;
      btnMusic.querySelector('.icon').textContent = '⏸';
      musicLabel.textContent = 'Pausar música';
    }
  };

  /* ── Toggle galaxia ── */
  window.toggleGalaxy = function () {
    const galaxyCanvas = document.getElementById('galaxy-canvas');
    galaxyVisible = !galaxyVisible;
    if (galaxyVisible) {
      galaxyCanvas.classList.remove('hidden');
      document.querySelector('#btn-galaxy span:last-child').textContent = 'Ocultar galaxia';
    } else {
      galaxyCanvas.classList.add('hidden');
      document.querySelector('#btn-galaxy span:last-child').textContent = 'Mostrar galaxia';
    }
  };

  /* ── Toggle letras ── */
  window.toggleLyrics = function () {
    const lyricsContainer = document.getElementById('lyrics-container');
    lyricsVisible = !lyricsVisible;
    if (lyricsVisible) {
      lyricsContainer.classList.remove('hidden');
      document.querySelector('#btn-lyrics span:last-child').textContent = 'Ocultar letras';
    } else {
      lyricsContainer.classList.add('hidden');
      document.querySelector('#btn-lyrics span:last-child').textContent = 'Mostrar letras';
    }
  };

  /* ── Actualización de letras + barra de progreso ── */
  function updateLyrics() {
    const currentTime = music.currentTime;

    // Barra de progreso
    if (music.duration && !isNaN(music.duration)) {
      progressBar.style.width = ((currentTime / music.duration) * 100) + '%';
    }

    // Buscar línea activa
    let activeIdx = -1;
    for (let i = lyrics.length - 1; i >= 0; i--) {
      if (currentTime >= lyrics[i].time) { activeIdx = i; break; }
    }

    if (activeIdx === currentLyricIdx) return;  // sin cambio
    currentLyricIdx = activeIdx;

    lyricPrev.textContent = activeIdx > 0 ? lyrics[activeIdx - 1].text : '';
    lyricCurr.textContent = activeIdx >= 0 ? lyrics[activeIdx].text : '';
    lyricNext.textContent = activeIdx < lyrics.length - 1 ? lyrics[activeIdx + 1].text : '';
  }

  // Actualizar letras 4 veces por segundo (ligero, no afecta FPS)
  setInterval(updateLyrics, 250);
  </script>
